<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>College Results — Live Oak</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: #f8f7f4; color: #1a1a1a; }
    header { background: #1a1a1a; padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 56px; }
    header h1 { font-size: 0.95rem; font-weight: 600; color: #fff; letter-spacing: 0.01em; }
    nav a { margin-left: 1.5rem; text-decoration: none; color: #888; font-size: 0.85rem; }
    nav a.active, nav a:hover { color: #fff; }
    .container { max-width: 920px; margin: 2rem auto; padding: 0 1.25rem; }
    .tabs { display: flex; gap: 6px; margin-bottom: 1.75rem; }
    .tab { padding: 7px 20px; border-radius: 6px; border: 1px solid #e0ddd8; background: #fff; cursor: pointer; font-size: 0.85rem; color: #666; font-family: inherit; }
    .tab.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; font-weight: 500; }
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.5rem; }
    .stat-card { background: #fff; border: 1px solid #e8e5e0; border-radius: 10px; padding: 1.1rem 1rem; text-align: center; }
    .stat-card .num { font-size: 2rem; font-weight: 600; color: #1a1a1a; }
    .stat-card .label { font-size: 0.72rem; color: #999; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.05em; }
    .chart-card { background: #fff; border: 1px solid #e8e5e0; border-radius: 10px; padding: 1.25rem; margin-bottom: 1.5rem; }
    .chart-card h3 { font-size: 0.75rem; color: #999; margin-bottom: 1rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; }
    .entries { display: flex; flex-direction: column; gap: 10px; }
    .entry-card { background: #fff; border: 1px solid #e8e5e0; border-radius: 10px; padding: 1rem 1.25rem; }
    .entry-top { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 8px; }
    .pill { font-size: 0.72rem; padding: 3px 10px; border-radius: 5px; font-weight: 500; }
    .pill-gray { background: #f0ede8; color: #555; }
    .pill-accepted { background: #dcfce7; color: #15803d; }
    .pill-rejected { background: #fee2e2; color: #b91c1c; }
    .pill-waitlisted { background: #fef9c3; color: #a16207; }
    .pill-deferred { background: #dbeafe; color: #1d4ed8; }
    .pill-withdrawn { background: #f1f5f9; color: #475569; }
    .pill-pending { background: #fce7f3; color: #be185d; }
    .ecs { font-size: 0.8rem; color: #888; margin-bottom: 8px; line-height: 1.5; }
    .decisions { display: flex; flex-wrap: wrap; gap: 6px; }
    .empty { text-align: center; color: #bbb; padding: 4rem 0; font-size: 0.9rem; }
    .form-wrap { background: #fff; border: 1px solid #e8e5e0; border-radius: 12px; padding: 2rem; max-width: 580px; margin: 0 auto; }
    .form-wrap h2 { font-size: 1rem; font-weight: 600; margin-bottom: 0.35rem; }
    .form-subtitle { font-size: 0.82rem; color: #999; margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.78rem; color: #666; margin-bottom: 5px; font-weight: 500; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 9px 12px; border: 1px solid #e0ddd8; border-radius: 7px; font-size: 0.875rem; font-family: inherit; color: #1a1a1a; background: #fafaf9; }
    .form-group textarea { resize: vertical; min-height: 72px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .college-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
    .college-row input { flex: 2; padding: 9px 12px; border: 1px solid #e0ddd8; border-radius: 7px; font-size: 0.875rem; font-family: inherit; background: #fafaf9; }
    .college-row select { flex: 1; padding: 9px 12px; border: 1px solid #e0ddd8; border-radius: 7px; font-size: 0.875rem; font-family: inherit; background: #fafaf9; }
    .college-row button { background: none; border: 1px solid #e0ddd8; border-radius: 7px; padding: 8px 12px; cursor: pointer; color: #bbb; font-size: 1rem; flex-shrink: 0; }
    .add-btn { background: none; border: 1px dashed #ddd; border-radius: 7px; padding: 7px 14px; font-size: 0.8rem; color: #999; cursor: pointer; margin-bottom: 1.25rem; font-family: inherit; width: 100%; }
    .submit-btn { width: 100%; padding: 11px; background: #1a1a1a; color: #fff; border: none; border-radius: 7px; font-size: 0.875rem; font-weight: 500; cursor: pointer; font-family: inherit; }
    .submit-btn:hover { background: #333; }
    .success-msg { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; border-radius: 7px; padding: 0.75rem 1rem; margin-bottom: 1rem; font-size: 0.85rem; display: none; }
    .page { display: none; }
    .page.active { display: block; }
    #dot-tooltip { display: none; position: fixed; background: #1a1a1a; color: #fff; border-radius: 8px; padding: 12px 14px; font-size: 0.78rem; line-height: 1.6; max-width: 240px; pointer-events: none; z-index: 50; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
    @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } .stats-row { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>
<header>
  <h1>College Results — Live Oak</h1>
  <nav>
    <a href="#" class="active" id="nav-results" onclick="showPage('results'); return false;">Results</a>
    <a href="#" id="nav-submit" onclick="showPage('submit'); return false;">Submit yours</a>
  </nav>
</header>

<div class="container">
  <div class="page active" id="page-results">
    <div class="tabs" id="year-tabs"></div>
    <div class="stats-row" id="stats-row"></div>
    <div class="chart-card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px;">
        <h3 style="margin:0;">GPA by college</h3>
        <input type="text" id="college-search" placeholder="Search a college..." oninput="filterChart(this.value)"
          style="padding:6px 12px;border:1px solid #e0ddd8;border-radius:6px;font-size:0.82rem;font-family:inherit;width:220px;background:#fafaf9;" />
      </div>
      <div id="legend" style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:1rem;"></div>
      <canvas id="chart-scatter" height="220"></canvas>
    </div>
    <div id="dot-tooltip"></div>
    <div class="entries" id="entries"></div>
  </div>

  <div class="page" id="page-submit">
    <div class="form-wrap">
      <h2 id="form-title">Add your college results</h2>
      <p class="form-subtitle" id="form-subtitle">Anonymous — your name is never stored.</p>
      <div class="success-msg" id="success-msg">Saved!</div>
      <div class="form-row">
        <div class="form-group">
          <label>GPA (required)</label>
          <input type="number" id="f-gpa" step="1" min="1" max="5" placeholder="1–5" />
        </div>
        <div class="form-group">
          <label>Graduation year (required)</label>
          <select id="f-year">
            <option value="">Select year</option>
            <option>2026</option><option>2025</option><option>2024</option><option>2023</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>SAT score (optional)</label>
          <input type="number" id="f-sat" placeholder="e.g. 1480" />
        </div>
        <div class="form-group">
          <label>ACT score (optional)</label>
          <input type="number" id="f-act" placeholder="e.g. 33" />
        </div>
      </div>
      <div class="form-group">
        <label>Intended major (optional)</label>
        <input type="text" id="f-major" placeholder="e.g. Computer Science" />
      </div>
      <div class="form-group">
        <label>Top extracurriculars (optional)</label>
        <textarea id="f-ecs" placeholder="e.g. Varsity soccer captain, robotics club"></textarea>
      </div>
      <div class="form-group">
        <label>College decisions (add at least one)</label>
        <div id="college-inputs"></div>
        <button type="button" class="add-btn" onclick="addCollege()">+ Add another college</button>
      </div>
      <button type="button" class="submit-btn" id="submit-btn" onclick="submitForm()">Submit</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://fkieqpdobdznaspfkfwg.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZraWVxcGRvYmR6bmFzcGZrZndnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NDg5NDMsImV4cCI6MjA5MDEyNDk0M30.C4dHW1zK1M01tMlCv1gVqlGNaGOuaKEo2jdldlRtLMs';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const YEARS = [2023,2024,2025,2026];
const DECISIONS = ['Accepted','Rejected','Waitlisted','Deferred','Withdrawn','Pending'];
const DECISION_ORDER = ['Accepted','Waitlisted','Deferred','Rejected','Withdrawn','Pending'];
const DOT_COLORS = { Accepted:'#16a34a', Rejected:'#dc2626', Waitlisted:'#ca8a04', Deferred:'#2563eb', Withdrawn:'#64748b', Pending:'#db2777' };
const PILL_CLASS = { Accepted:'pill-accepted', Rejected:'pill-rejected', Waitlisted:'pill-waitlisted', Deferred:'pill-deferred', Withdrawn:'pill-withdrawn', Pending:'pill-pending' };

const SESSION_ID = localStorage.getItem('cr_sid') || (()=>{ const id=Math.random().toString(36).slice(2)+Date.now().toString(36); localStorage.setItem('cr_sid',id); return id; })();

let activeYear=2026, allData=[], scatterChart=null, scatterData=[], searchFilter='', collegeCount=0;

function showPage(name) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('nav a').forEach(a=>a.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  document.getElementById('dot-tooltip').style.display='none';
  if(name==='results') loadData();
  if(name==='submit') loadExistingSubmission();
}

async function loadData() {
  const {data,error} = await db.from('submissions').select('*');
  if(error){console.error(error);return;}
  allData=data||[];
  renderResults();
}

function renderResults() {
  renderTabs();
  const d=allData.filter(r=>r.grad_year==activeYear);
  renderStats(d); renderCharts(d); renderEntries(d);
}

function setYear(y){activeYear=y;renderResults();}

function renderTabs(){
  document.getElementById('year-tabs').innerHTML=YEARS.map(y=>
    `<button class="tab${y==activeYear?' active':''}" onclick="setYear(${y})">${y}</button>`
  ).join('');
}

function renderStats(data){
  const p=new Map();
  data.forEach(r=>{
    const k=r.session_id||`${r.gpa}|${r.sat}|${r.act}`;
    if(!p.has(k)) p.set(k,{gpa:r.gpa,ok:false});
    if(r.decision==='Accepted') p.get(k).ok=true;
  });
  const t=p.size, a=[...p.values()].filter(x=>x.ok).length;
  const g=t?([...p.values()].reduce((s,x)=>s+(x.gpa||0),0)/t).toFixed(2):'—';
  document.getElementById('stats-row').innerHTML=`
    <div class="stat-card"><div class="num">${t}</div><div class="label">Students</div></div>
    <div class="stat-card"><div class="num">${a}</div><div class="label">Got in somewhere</div></div>
    <div class="stat-card"><div class="num">${t?Math.round(a/t*100)+'%':'—'}</div><div class="label">Accept rate</div></div>
    <div class="stat-card"><div class="num">${g}</div><div class="label">Avg GPA</div></div>`;
}

function renderCharts(data){scatterData=data;buildScatter(data,false);}
function filterChart(val){searchFilter=val.toLowerCase().trim();buildScatter(scatterData,false);}

function buildScatter(data,animate){
  const all=[...new Set(data.map(r=>r.college_name).filter(Boolean))].sort();
  const cols=searchFilter?all.filter(c=>c.toLowerCase().includes(searchFilter)):all;
  const datasets=DECISION_ORDER.map(dec=>({
    label:dec,
    data:data.filter(r=>r.decision===dec&&cols.includes(r.college_name)).map(r=>({x:cols.indexOf(r.college_name),y:r.gpa,raw:r})),
    backgroundColor:DOT_COLORS[dec]+'cc', borderColor:DOT_COLORS[dec], borderWidth:1.5, pointRadius:7, pointHoverRadius:10
  })).filter(ds=>ds.data.length>0);

  if(scatterChart) scatterChart.destroy();
  scatterChart=new Chart(document.getElementById('chart-scatter').getContext('2d'),{
    type:'scatter', data:{datasets},
    options:{
      animation:animate?{duration:900,easing:'easeOutBounce'}:{duration:250},
      plugins:{legend:{display:false},tooltip:{enabled:false}},
      scales:{
        x:{type:'linear',min:-0.5,max:Math.max(cols.length-0.5,0.5),
          ticks:{stepSize:1,font:{size:10},callback:v=>cols[Math.round(v)]||'',maxRotation:45,minRotation:30},
          grid:{color:'#f0ede8'}},
        y:{title:{display:true,text:'GPA',font:{size:11},color:'#999'},min:1,max:5,
          ticks:{stepSize:1,font:{size:11}},grid:{color:'#f0ede8'}}
      },
      onClick:(evt,els)=>{
        if(!els.length){document.getElementById('dot-tooltip').style.display='none';return;}
        showTooltip(evt,scatterChart.data.datasets[els[0].datasetIndex].data[els[0].index].raw);
      },
      onHover:(evt,els)=>{evt.native.target.style.cursor=els.length?'pointer':'default';}
    }
  });

  document.getElementById('legend').innerHTML=DECISION_ORDER.filter(d=>datasets.find(ds=>ds.label===d)).map(d=>
    `<span style="display:flex;align-items:center;gap:5px;font-size:0.75rem;color:#555;"><span style="width:10px;height:10px;border-radius:50%;background:${DOT_COLORS[d]};display:inline-block;"></span>${d}</span>`
  ).join('');
}

function showTooltip(evt,r){
  const key=r.session_id||`${r.gpa}|${r.sat}|${r.act}`;
  const sibs=scatterData.filter(x=>(x.session_id||`${x.gpa}|${x.sat}|${x.act}`)===key);
  const tip=document.getElementById('dot-tooltip');
  tip.innerHTML=`<div style="font-weight:600;margin-bottom:6px;">GPA ${r.gpa}${r.sat?` · SAT ${r.sat}`:''}${r.act?` · ACT ${r.act}`:''}${r.major?`<br><span style="font-weight:400;color:#aaa">${r.major}</span>`:''}</div>${r.extracurriculars?`<div style="color:#888;margin-bottom:6px;font-size:0.73rem;">${r.extracurriculars}</div>`:''}<div style="border-top:1px solid #333;padding-top:6px;line-height:1.8;">${sibs.map(s=>`<span style="color:${DOT_COLORS[s.decision]||'#aaa'}">${s.college_name} — ${s.decision}</span>`).join('<br>')}</div>`;
  tip.style.display='block';
  tip.style.left=Math.min(evt.native.clientX+16,window.innerWidth-260)+'px';
  tip.style.top=Math.max(evt.native.clientY-10,10)+'px';
}

document.addEventListener('click',e=>{
  const c=document.getElementById('chart-scatter');
  const t=document.getElementById('dot-tooltip');
  if(t&&c&&!c.contains(e.target)&&!t.contains(e.target)) t.style.display='none';
});

function renderEntries(data){
  const el=document.getElementById('entries');
  if(!data.length){el.innerHTML=`<div class="empty">No entries yet for ${activeYear}. Be the first!</div>`;return;}
  const groups=[],seen=new Map();
  data.forEach(r=>{
    const k=r.session_id||`${r.gpa}|${r.sat}|${r.act}|${r.major}|${r.extracurriculars}`;
    if(!seen.has(k)){seen.set(k,groups.length);groups.push({...r,colleges:[]});}
    groups[seen.get(k)].colleges.push({name:r.college_name,decision:r.decision});
  });
  el.innerHTML=groups.map(g=>`
    <div class="entry-card">
      <div class="entry-top">
        <span class="pill pill-gray">GPA ${g.gpa}</span>
        ${g.sat?`<span class="pill pill-gray">SAT ${g.sat}</span>`:''}
        ${g.act?`<span class="pill pill-gray">ACT ${g.act}</span>`:''}
        ${g.major?`<span class="pill pill-gray">${g.major}</span>`:''}
      </div>
      ${g.extracurriculars?`<div class="ecs">${g.extracurriculars}</div>`:''}
      <div class="decisions">${g.colleges.map(c=>`<span class="pill ${PILL_CLASS[c.decision]||'pill-gray'}">${c.name} — ${c.decision}</span>`).join('')}</div>
    </div>`).join('');
}

function addCollege(name='',decision='Accepted'){
  const id=collegeCount++;
  const div=document.createElement('div');
  div.className='college-row'; div.id=`cr-${id}`;
  div.innerHTML=`<input placeholder="College name" id="cn-${id}" value="${name}" /><select id="cd-${id}">${DECISIONS.map(d=>`<option${d===decision?' selected':''}>${d}</option>`).join('')}</select><button type="button" onclick="document.getElementById('cr-${id}').remove()">×</button>`;
  document.getElementById('college-inputs').appendChild(div);
}

async function loadExistingSubmission(){
  const {data}=await db.from('submissions').select('*').eq('session_id',SESSION_ID);
  document.getElementById('college-inputs').innerHTML=''; collegeCount=0;
  if(data&&data.length>0){
    const r=data[0];
    document.getElementById('f-gpa').value=r.gpa||'';
    document.getElementById('f-sat').value=r.sat||'';
    document.getElementById('f-act').value=r.act||'';
    document.getElementById('f-major').value=r.major||'';
    document.getElementById('f-ecs').value=r.extracurriculars||'';
    document.getElementById('f-year').value=r.grad_year||'';
    data.forEach(row=>addCollege(row.college_name||'',row.decision||'Accepted'));
    document.getElementById('submit-btn').textContent='Update submission';
    document.getElementById('form-title').textContent='Edit your submission';
    document.getElementById('form-subtitle').textContent='Update your results below.';
  } else {
    document.getElementById('f-gpa').value=''; document.getElementById('f-sat').value='';
    document.getElementById('f-act').value=''; document.getElementById('f-major').value='';
    document.getElementById('f-ecs').value=''; document.getElementById('f-year').value='';
    addCollege();
    document.getElementById('submit-btn').textContent='Submit';
    document.getElementById('form-title').textContent='Add your college results';
    document.getElementById('form-subtitle').textContent='Anonymous — your name is never stored.';
  }
}

async function submitForm(){
  const gpa=parseFloat(document.getElementById('f-gpa').value);
  const year=parseInt(document.getElementById('f-year').value);
  if(!gpa||!year){alert('GPA and graduation year are required!');return;}
  const rows=[];
  for(let i=0;i<collegeCount;i++){
    const cn=document.getElementById(`cn-${i}`), cd=document.getElementById(`cd-${i}`);
    if(cn&&cn.value.trim()) rows.push({
      gpa, grad_year:year,
      sat:parseInt(document.getElementById('f-sat').value)||null,
      act:parseInt(document.getElementById('f-act').value)||null,
      major:document.getElementById('f-major').value.trim()||null,
      extracurriculars:document.getElementById('f-ecs').value.trim()||null,
      college_name:cn.value.trim(), decision:cd.value, session_id:SESSION_ID
    });
  }
  if(!rows.length){alert('Add at least one college!');return;}
  await db.from('submissions').delete().eq('session_id',SESSION_ID);
  const {error}=await db.from('submissions').insert(rows);
  if(error){alert('Something went wrong. Try again.');console.error(error);return;}
  document.getElementById('success-msg').style.display='block';
  setTimeout(()=>{
    showPage('results');
    loadData();
  },800);
}

loadData();
</script>
</body>
</html>
