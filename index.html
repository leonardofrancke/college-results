<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>College Results — Live Oak</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    :root {
      --bg:#f4f4f5; --surface:#fff; --border:#e4e4e7;
      --text:#09090b; --text2:#71717a; --text3:#a1a1aa;
      --accent:#18181b; --accent-fg:#fff;
    }
    [data-theme="dark"] {
      --bg:#09090b; --surface:#18181b; --border:#27272a;
      --text:#fafafa; --text2:#a1a1aa; --text3:#52525b;
      --accent:#fafafa; --accent-fg:#09090b;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    html, body, header, .stat-card, .chart-card, .entry-card, .form-wrap,
    .form-group input, .form-group select, .form-group textarea, .add-btn, .theme-btn,
    nav a, .tab, .chart-tab, .pill-gray {
      transition: background 0.35s ease, color 0.35s ease, border-color 0.35s ease;
    }
    header { background:var(--surface); border-bottom:1px solid var(--border); padding:0 2rem; display:flex; align-items:center; justify-content:space-between; height:52px; position:sticky; top:0; z-index:40; }
    header h1 { font-size:0.88rem; font-weight:600; color:var(--text); }
    .hdr-right { display:flex; align-items:center; gap:10px; }
    nav { display:flex; gap:3px; }
    nav a { padding:5px 11px; border-radius:6px; text-decoration:none; color:var(--text2); font-size:0.8rem; }
    nav a:hover { background:var(--border); color:var(--text); }
    nav a.active { background:var(--accent); color:var(--accent-fg); font-weight:500; }
    .theme-btn { width:30px; height:30px; border-radius:7px; border:1px solid var(--border); background:var(--surface); color:var(--text2); cursor:pointer; font-size:13px; display:flex; align-items:center; justify-content:center; }
    .theme-btn:hover { background:var(--bg); }
    .container { max-width:920px; margin:2rem auto; padding:0 1.25rem; }

    /* PAGE TRANSITIONS - directional */
    .container { overflow:hidden; }
    .page { display:none; position:relative; }
    .page.active { display:block; }
    .page.slide-in-right { display:block; animation:slideInRight 0.35s cubic-bezier(0.16,1,0.3,1) forwards; }
    .page.slide-in-left  { display:block; animation:slideInLeft  0.35s cubic-bezier(0.16,1,0.3,1) forwards; }
    .page.slide-out-left  { display:block; animation:slideOutLeft  0.25s ease forwards; pointer-events:none; position:absolute; top:0; left:0; right:0; }
    .page.slide-out-right { display:block; animation:slideOutRight 0.25s ease forwards; pointer-events:none; position:absolute; top:0; left:0; right:0; }
    @keyframes slideInRight  { from{opacity:0;transform:translateX(40px)} to{opacity:1;transform:translateX(0)} }
    @keyframes slideInLeft   { from{opacity:0;transform:translateX(-40px)} to{opacity:1;transform:translateX(0)} }
    @keyframes slideOutLeft  { from{opacity:1;transform:translateX(0)} to{opacity:0;transform:translateX(-30px)} }
    @keyframes slideOutRight { from{opacity:1;transform:translateX(0)} to{opacity:0;transform:translateX(30px)} }

    .tabs { display:flex; gap:5px; margin-bottom:1.75rem; }
    .tab { padding:6px 16px; border-radius:6px; border:1px solid var(--border); background:var(--surface); cursor:pointer; font-size:0.8rem; color:var(--text2); font-family:inherit; transition:all 0.15s; }
    .tab:hover { border-color:var(--text3); color:var(--text); }
    .tab.active { background:var(--accent); color:var(--accent-fg); border-color:var(--accent); font-weight:500; }
    .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:1.5rem; }
    .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1rem; text-align:center; transition:background 0.4s,border-color 0.4s; }
    .stat-card .num { font-size:1.9rem; font-weight:600; color:var(--text); letter-spacing:-0.02em; }
    .stat-card .lbl { font-size:0.68rem; color:var(--text3); margin-top:3px; text-transform:uppercase; letter-spacing:0.06em; }
    .chart-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1.25rem; margin-bottom:1.5rem; transition:background 0.4s,border-color 0.4s; }
    .chart-tabs { display:flex; gap:5px; }
    .chart-tab { padding:4px 12px; border-radius:5px; border:1px solid var(--border); background:transparent; cursor:pointer; font-size:0.75rem; color:var(--text2); font-family:inherit; transition:all 0.15s; }
    .chart-tab.active { background:var(--accent); color:var(--accent-fg); border-color:var(--accent); }
    .entries { display:flex; flex-direction:column; gap:10px; }
    .entry-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1rem 1.25rem; transition:border-color 0.15s,background 0.4s; }
    .entry-card:hover { border-color:var(--text3); }
    .entry-top { display:flex; gap:7px; flex-wrap:wrap; margin-bottom:8px; }
    .pill { font-size:0.7rem; padding:3px 9px; border-radius:5px; font-weight:500; }
    .pill-gray { background:var(--bg); color:var(--text2); }
    .pill-accepted { background:#dcfce7; color:#15803d; }
    .pill-rejected { background:#fee2e2; color:#b91c1c; }
    .pill-waitlisted { background:#fef9c3; color:#a16207; }
    .pill-deferred { background:#dbeafe; color:#1d4ed8; }
    .pill-withdrawn { background:#f1f5f9; color:#475569; }
    .pill-pending { background:#fce7f3; color:#be185d; }
    .ecs { font-size:0.78rem; color:var(--text2); margin-bottom:8px; line-height:1.5; }
    .decisions { display:flex; flex-wrap:wrap; gap:6px; }
    .empty { text-align:center; color:var(--text3); padding:4rem 0; font-size:0.88rem; }
    .form-wrap { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:2rem; max-width:580px; margin:0 auto; transition:background 0.4s,border-color 0.4s; }
    .form-wrap h2 { font-size:1rem; font-weight:600; margin-bottom:0.3rem; color:var(--text); }
    .form-subtitle { font-size:0.8rem; color:var(--text3); margin-bottom:1.5rem; }
    .form-group { margin-bottom:1rem; }
    .form-group label { display:block; font-size:0.75rem; color:var(--text2); margin-bottom:5px; font-weight:500; }
    .form-group input,.form-group select,.form-group textarea { width:100%; padding:9px 12px; border:1px solid var(--border); border-radius:7px; font-size:0.875rem; font-family:inherit; color:var(--text); background:var(--bg); transition:border-color 0.15s,background 0.4s; }
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus { outline:none; border-color:var(--text2); }
    .form-group textarea { resize:vertical; min-height:72px; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .form-row-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
    .add-btn { background:none; border:1px dashed var(--border); border-radius:7px; padding:7px 14px; font-size:0.8rem; color:var(--text3); cursor:pointer; margin-bottom:1.25rem; font-family:inherit; width:100%; transition:all 0.15s; }
    .add-btn:hover { border-color:var(--text2); color:var(--text2); }
    .submit-btn { width:100%; padding:11px; background:var(--accent); color:var(--accent-fg); border:none; border-radius:7px; font-size:0.875rem; font-weight:500; cursor:pointer; font-family:inherit; transition:opacity 0.15s; }
    .submit-btn:hover { opacity:0.85; }
    .success-msg { background:#f0fdf4; color:#15803d; border:1px solid #bbf7d0; border-radius:7px; padding:0.75rem 1rem; margin-bottom:1rem; font-size:0.85rem; display:none; }
    #dot-tooltip { display:none; position:fixed; background:var(--accent); color:var(--accent-fg); border-radius:8px; padding:12px 14px; font-size:0.75rem; line-height:1.7; max-width:250px; pointer-events:none; z-index:50; box-shadow:0 4px 24px rgba(0,0,0,0.2); }
    .tip-lbl { color:var(--text3); font-size:0.67rem; text-transform:uppercase; letter-spacing:0.05em; }
    [data-theme="dark"] .tip-lbl { color:#52525b; }
    #particle-canvas { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:999; display:none; }
    @media (max-width:600px) { .form-row,.form-row-3 { grid-template-columns:1fr; } .stats-row { grid-template-columns:repeat(2,1fr); } }
  </style>
</head>
<body>
<canvas id="particle-canvas"></canvas>
<header>
  <h1>College Results — Live Oak</h1>
  <div class="hdr-right">
    <nav>
      <a href="#" class="active" id="nav-results" onclick="showPage('results');return false;">Results</a>
      <a href="#" id="nav-submit" onclick="showPage('submit');return false;">Submit yours</a>
    </nav>
    <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">☀</button>
  </div>
</header>

<div class="container">
  <div class="page active" id="page-results">
    <div class="tabs" id="year-tabs"></div>
    <div class="stats-row" id="stats-row"></div>
    <div class="chart-card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px;">
        <div class="chart-tabs">
          <button class="chart-tab active" onclick="switchChart('gpa',this)">GPA</button>
          <button class="chart-tab" onclick="switchChart('sat',this)">SAT</button>
        </div>
        <input type="text" id="college-search" placeholder="Search a college..." oninput="filterChart(this.value)"
          style="padding:6px 12px;border:1px solid var(--border);border-radius:6px;font-size:0.8rem;font-family:inherit;width:200px;background:var(--bg);color:var(--text);"/>
      </div>
      <div id="legend" style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:1rem;"></div>
      <div id="chart-main" style="width:100%;overflow-x:auto;"></div>
    </div>
    <div id="dot-tooltip"></div>
    <div class="entries" id="entries"></div>
  </div>

  <div class="page" id="page-submit">
    <div class="form-wrap">
      <h2 id="form-title">Add your college results</h2>
      <p class="form-subtitle" id="form-subtitle">Anonymous — your name is never stored.</p>
      <div class="success-msg" id="success-msg">Saved!</div>
      <div class="form-row">
        <div class="form-group">
          <label>Graduation year (required)</label>
          <select id="f-year">
            <option value="">Select year</option>
            <option>2026</option><option>2025</option><option>2024</option><option>2023</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Unweighted GPA (required)</label>
          <input type="number" id="f-gpa" step="0.01" min="1" max="4" placeholder="1.0 – 4.0"/>
        </div>
        <div class="form-group">
          <label>Weighted GPA (required)</label>
          <input type="number" id="f-gpa-w" step="0.01" min="1" max="5" placeholder="1.0 – 5.0"/>
        </div>
      </div>
      <div class="form-row-3">
        <div class="form-group">
          <label>SAT score (optional)</label>
          <input type="number" id="f-sat" placeholder="e.g. 1480"/>
        </div>
        <div class="form-group">
          <label>ACT score (optional)</label>
          <input type="number" id="f-act" placeholder="e.g. 33"/>
        </div>
        <div class="form-group">
          <label>Class rank (optional)</label>
          <input type="number" id="f-rank" placeholder="e.g. 15"/>
        </div>
      </div>
      <div class="form-group">
        <label>Intended major (optional)</label>
        <input type="text" id="f-major" placeholder="e.g. Computer Science"/>
      </div>
      <div class="form-group">
        <label>Top extracurriculars (optional)</label>
        <textarea id="f-ecs" placeholder="e.g. Varsity soccer captain, robotics club"></textarea>
      </div>
      <div class="form-group">
        <label>College decisions (add at least one)</label>
        <div id="college-inputs"></div>
        <button type="button" class="add-btn" onclick="addCollege()">+ Add another college</button>
      </div>
      <button type="button" class="submit-btn" id="submit-btn" onclick="submitForm()">Submit</button>
    </div>
  </div>
</div>

const ALL_COLLEGES=Object.keys(COLLEGE_ACCEPT_RATES).sort();

function normalizeName(n){return n.replace(/\b(university|college|institute of technology|state university)\b/gi,'').replace(/\s+/g,' ').trim();}
function getAcceptRate(name){
  if(COLLEGE_ACCEPT_RATES[name]) return COLLEGE_ACCEPT_RATES[name];
  const norm=normalizeName(name).toLowerCase();
  const m=Object.keys(COLLEGE_ACCEPT_RATES).find(k=>normalizeName(k).toLowerCase()===norm);
  if(m) return COLLEGE_ACCEPT_RATES[m];
  const p=Object.keys(COLLEGE_ACCEPT_RATES).find(k=>{const kn=normalizeName(k).toLowerCase();return norm.includes(kn)||kn.includes(norm);});
  return p?COLLEGE_ACCEPT_RATES[p]:100;
}

const SESSION_ID=localStorage.getItem('cr_sid')||(()=>{const id=Math.random().toString(36).slice(2)+Date.now().toString(36);localStorage.setItem('cr_sid',id);return id;})();
const HAS_SUBMITTED=()=>localStorage.getItem('cr_submitted')==='1';

let activeYear=2026,allData=[],scatterData=[],searchFilter='',collegeCount=0,activeChartType='gpa',currentPage='results';

// THEME
const savedTheme=localStorage.getItem('cr_theme')||'light';
document.documentElement.setAttribute('data-theme',savedTheme);
document.getElementById('theme-btn').textContent=savedTheme==='dark'?'☀':'☾';

function toggleTheme(){
  const cur=document.documentElement.getAttribute('data-theme');
  const next=cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  localStorage.setItem('cr_theme',next);
  document.getElementById('theme-btn').textContent=next==='dark'?'☀':'☾';
}

const PAGE_ORDER=['results','submit'];
function showPage(name){
  if(name===currentPage) return;
  const oldEl=document.getElementById('page-'+currentPage);
  const newEl=document.getElementById('page-'+name);
  const goingRight=PAGE_ORDER.indexOf(name)>PAGE_ORDER.indexOf(currentPage);
  document.querySelectorAll('nav a').forEach(a=>a.classList.remove('active'));
  document.getElementById('nav-'+name).classList.add('active');
  updateNav();

  // Old page slides out
  oldEl.classList.remove('active');
  oldEl.classList.add(goingRight?'slide-out-left':'slide-out-right');

  // New page slides in after brief delay
  newEl.style.display='block';
  newEl.classList.add(goingRight?'slide-in-right':'slide-in-left');

  setTimeout(()=>{
    oldEl.classList.remove('slide-out-left','slide-out-right');
    oldEl.style.display='none';
    newEl.classList.remove('slide-in-right','slide-in-left');
    newEl.classList.add('active');
    currentPage=name;
    if(name==='results') loadData();
    if(name==='submit') loadExistingSubmission();
  },350);
}

function updateNav(){
  document.getElementById('nav-submit').textContent=HAS_SUBMITTED()?'Edit Submission':'Submit yours';
}

// DATA
async function loadData(){
  const {data,error}=await db.from('submissions').select('*');
  if(error){console.error(error);return;}
  allData=data||[];
  renderResults();
}

function renderResults(){
  renderTabs();
  const d=allData.filter(r=>r.grad_year==activeYear);
  renderStats(d);renderCharts(d);renderEntries(d);
}

function setYear(y){activeYear=y;renderResults();}

function renderTabs(){
  document.getElementById('year-tabs').innerHTML=YEARS.map(y=>
    `<button class="tab${y==activeYear?' active':''}" onclick="setYear(${y})">${y}</button>`
  ).join('');
}

function renderStats(data){
  const p=new Map();
  data.forEach(r=>{
    const k=r.session_id||`${r.gpa}|${r.sat}|${r.act}`;
    if(!p.has(k)) p.set(k,{gpa:r.gpa,ok:false});
    if(r.decision==='Accepted') p.get(k).ok=true;
  });
  const t=p.size,a=[...p.values()].filter(x=>x.ok).length;
  const g=t?([...p.values()].reduce((s,x)=>s+(x.gpa||0),0)/t).toFixed(2):'—';
  document.getElementById('stats-row').innerHTML=`
    <div class="stat-card"><div class="num">${t}</div><div class="lbl">Students</div></div>
    <div class="stat-card"><div class="num">${a}</div><div class="lbl">Got in somewhere</div></div>
    <div class="stat-card"><div class="num">${t?Math.round(a/t*100)+'%':'—'}</div><div class="lbl">Accept rate</div></div>
    <div class="stat-card"><div class="num">${g}</div><div class="lbl">Avg GPA</div></div>`;
}

function renderCharts(data){scatterData=data;buildChart(data,false);}
function filterChart(val){searchFilter=val.toLowerCase().trim();buildChart(scatterData,false);}
function switchChart(type,btn){
  activeChartType=type;
  document.querySelectorAll('.chart-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  buildChart(scatterData,false);
}

function buildChart(data,animate){
  const allCols=[...new Set(data.map(r=>r.college_name).filter(Boolean))];
  allCols.sort((a,b)=>{
    const at=data.filter(r=>r.college_name===a).length;
    const bt=data.filter(r=>r.college_name===b).length;
    if(bt!==at) return bt-at;
    return getAcceptRate(a)-getAcceptRate(b);
  });
  const cols=searchFilter?allCols.filter(c=>c.toLowerCase().includes(searchFilter)):allCols;
  const el=document.getElementById('chart-main');
  el.innerHTML='';
  if(!cols.length){document.getElementById('legend').innerHTML='';return;}

  const yKey=activeChartType==='gpa'?'gpa':'sat';
  const yLabel=activeChartType==='gpa'?'GPA':'SAT Score';
  const yMin=activeChartType==='gpa'?1:400;
  const yMax=activeChartType==='gpa'?5:1600;
  const filtered=data.filter(r=>r[yKey]!=null&&cols.includes(r.college_name));

  const W=Math.max(el.closest('.chart-card').clientWidth-40,cols.length*60,400);
  const H=340;
  const PAD={top:20,right:20,bottom:100,left:55};
  const plotW=W-PAD.left-PAD.right;
  const plotH=H-PAD.top-PAD.bottom;
  const colW=plotW/cols.length;
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  const gridCol=isDark?'#27272a':'#f0ede8';
  const axisCol=isDark?'#52525b':'#e4e4e7';
  const textCol=isDark?'#71717a':'#71717a';
  const labelCol=isDark?'#a1a1aa':'#555';

  let svg=`<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg" style="overflow:visible;display:block;">`;
  const ySteps=activeChartType==='gpa'?[1,2,3,4,5]:[400,600,800,1000,1200,1400,1600];
  ySteps.forEach(v=>{
    const y=PAD.top+plotH-(v-yMin)/(yMax-yMin)*plotH;
    svg+=`<line x1="${PAD.left}" y1="${y}" x2="${PAD.left+plotW}" y2="${y}" stroke="${gridCol}" stroke-width="1"/>`;
    svg+=`<text x="${PAD.left-8}" y="${y+4}" text-anchor="end" font-size="11" fill="${textCol}" font-family="Inter,sans-serif">${v}</text>`;
  });
  svg+=`<text x="14" y="${PAD.top+plotH/2}" text-anchor="middle" font-size="11" fill="${textCol}" font-family="Inter,sans-serif" transform="rotate(-90,14,${PAD.top+plotH/2})">${yLabel}</text>`;
  svg+=`<line x1="${PAD.left}" y1="${PAD.top+plotH}" x2="${PAD.left+plotW}" y2="${PAD.top+plotH}" stroke="${axisCol}" stroke-width="1"/>`;

  cols.forEach((col,i)=>{
    const x=PAD.left+i*colW+colW/2;
    const y=PAD.top+plotH+12;
    svg+=`<text x="${x}" y="${y}" text-anchor="end" font-size="10" fill="${labelCol}" font-family="Inter,sans-serif" transform="rotate(-40,${x},${y})">${col}</text>`;
  });

  filtered.forEach((r,ri)=>{
    const i=cols.indexOf(r.college_name);
    const x=PAD.left+i*colW+colW/2;
    const y=PAD.top+plotH-(parseFloat(r[yKey])-yMin)/(yMax-yMin)*plotH;
    const col=DOT_COLORS[r.decision]||'#888';
    const delay=animate?ri*55:0;
    const animAttr=animate?`style="animation:dotSpring 0.65s cubic-bezier(0.34,1.56,0.64,1) ${delay}ms both"`:'';
    svg+=`<circle cx="${x}" cy="${y}" r="6" fill="${col}cc" stroke="${col}" stroke-width="1.5" style="cursor:pointer${animate?`;animation:dotSpring 0.65s cubic-bezier(0.34,1.56,0.64,1) ${delay}ms both`:''};" onclick="handleDotClick(event,${allData.indexOf(r)})"/>`;
  });

  svg+=`<defs><style>@keyframes dotSpring{0%{transform-origin:center;transform:scale(0);opacity:0}50%{opacity:1}65%{transform:scale(1.35)}80%{transform:scale(0.9)}90%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}</style></defs>`;
  svg+=`</svg>`;
  el.innerHTML=svg;

  const used=DECISION_ORDER.filter(d=>filtered.find(r=>r.decision===d));
  document.getElementById('legend').innerHTML=used.map(d=>
    `<span style="display:flex;align-items:center;gap:5px;font-size:0.75rem;color:var(--text2);"><span style="width:9px;height:9px;border-radius:50%;background:${DOT_COLORS[d]};display:inline-block;"></span>${d}</span>`
  ).join('');
}

function handleDotClick(evt,idx){
  evt.stopPropagation();
  if(idx<0||idx>=allData.length) return;
  showTooltip(evt,allData[idx]);
}

function showTooltip(evt,r){
  const key=r.session_id||`${r.gpa}|${r.sat}|${r.act}`;
  const sibs=scatterData.filter(x=>(x.session_id||`${x.gpa}|${x.sat}|${x.act}`)===key);
  const tip=document.getElementById('dot-tooltip');
  const gpaLine=`<div><span class="tip-lbl">UW GPA</span> ${r.gpa}${r.gpa_weighted?` &nbsp;·&nbsp; <span class="tip-lbl">W</span> ${r.gpa_weighted}`:''}</div>`;
  const testLine=(r.sat||r.act)?`<div style="margin-top:3px;">${r.sat?`<span class="tip-lbl">SAT</span> ${r.sat}`:''}${r.sat&&r.act?' · ':''}${r.act?`<span class="tip-lbl">ACT</span> ${r.act}`:''}</div>`:'';
  const rankLine=r.class_rank?`<div style="margin-top:3px;"><span class="tip-lbl">Rank</span> #${r.class_rank}</div>`:'';
  const majorLine=r.major?`<div style="margin-top:3px;"><span class="tip-lbl">Major</span> ${r.major}</div>`:'';
  const ecsLine=r.extracurriculars?`<div style="margin-top:4px;opacity:0.7;font-size:0.72rem;">${r.extracurriculars}</div>`:'';
  const decisions=sibs.map(s=>`<span style="color:${DOT_COLORS[s.decision]||'#aaa'}">${s.college_name} — ${s.decision}</span>`).join('<br>');
  tip.innerHTML=`${gpaLine}${testLine}${rankLine}${majorLine}${ecsLine}<div style="border-top:1px solid rgba(255,255,255,0.15);margin-top:8px;padding-top:8px;line-height:1.9;">${decisions}</div>`;
  tip.style.display='block';
  tip.style.left=Math.min(evt.clientX+16,window.innerWidth-270)+'px';
  tip.style.top=Math.max(evt.clientY-10,10)+'px';
}

document.addEventListener('click',e=>{
  const t=document.getElementById('dot-tooltip');
  if(t&&!e.target.closest('circle')) t.style.display='none';
});

function renderEntries(data){
  const el=document.getElementById('entries');
  if(!data.length){el.innerHTML=`<div class="empty">No entries yet for ${activeYear}. Be the first!</div>`;return;}
  const groups=[],seen=new Map();
  data.forEach(r=>{
    const k=r.session_id||`${r.gpa}|${r.sat}|${r.act}|${r.major}|${r.extracurriculars}`;
    if(!seen.has(k)){seen.set(k,groups.length);groups.push({...r,colleges:[]});}
    groups[seen.get(k)].colleges.push({name:r.college_name,decision:r.decision});
  });
  el.innerHTML=groups.map(g=>`
    <div class="entry-card">
      <div class="entry-top">
        <span class="pill pill-gray">UW ${g.gpa}</span>
        ${g.gpa_weighted?`<span class="pill pill-gray">W ${g.gpa_weighted}</span>`:''}
        ${g.sat?`<span class="pill pill-gray">SAT ${g.sat}</span>`:''}
        ${g.act?`<span class="pill pill-gray">ACT ${g.act}</span>`:''}
        ${g.class_rank?`<span class="pill pill-gray">Rank #${g.class_rank}</span>`:''}
        ${g.major?`<span class="pill pill-gray">${g.major}</span>`:''}
      </div>
      ${g.extracurriculars?`<div class="ecs">${g.extracurriculars}</div>`:''}
      <div class="decisions">${g.colleges.map(c=>`<span class="pill ${PILL_CLASS[c.decision]||'pill-gray'}">${c.name} — ${c.decision}</span>`).join('')}</div>
    </div>`).join('');
}

// FORM
function getKnownColleges(){
  const submitted=allData.map(r=>r.college_name).filter(Boolean);
  return [...new Set([...ALL_COLLEGES,...submitted])].sort();
}

function addCollege(name='',decision='Accepted'){
  const id=collegeCount++;
  const div=document.createElement('div');
  div.id=`cr-${id}`;
  div.style.cssText='display:flex;gap:8px;margin-bottom:8px;align-items:center;';
  div.innerHTML=`
    <div style="flex:2;position:relative;">
      <input placeholder="College name" id="cn-${id}" value="${name}" autocomplete="off"
        oninput="showSuggestions('cn-${id}')" onblur="setTimeout(()=>hideSuggestions('cn-${id}'),400)"
        style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:7px;font-size:0.875rem;font-family:inherit;background:var(--bg);color:var(--text);box-sizing:border-box;"/>
      <div id="sug-${id}" style="display:none;position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:7px;z-index:100;max-height:160px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,0.12);margin-top:2px;"></div>
    </div>
    <select id="cd-${id}" style="flex:1;padding:9px 12px;border:1px solid var(--border);border-radius:7px;font-size:0.875rem;font-family:inherit;background:var(--bg);color:var(--text);">${DECISIONS.map(d=>`<option${d===decision?' selected':''}>${d}</option>`).join('')}</select>
    <button type="button" onclick="document.getElementById('cr-${id}').remove()" style="background:none;border:1px solid var(--border);border-radius:7px;padding:8px 12px;cursor:pointer;color:var(--text3);font-size:1rem;flex-shrink:0;">×</button>`;
  document.getElementById('college-inputs').appendChild(div);
}

function showSuggestions(inputId){
  const input=document.getElementById(inputId);
  const sug=document.getElementById(inputId.replace('cn-','sug-'));
  const val=input.value.toLowerCase().trim();
  if(!val){sug.style.display='none';return;}
  const matches=getKnownColleges().filter(c=>c.toLowerCase().includes(val));
  if(!matches.length){sug.style.display='none';return;}
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  sug.innerHTML=matches.slice(0,6).map(c=>
    `<div onclick="selectSuggestion('${inputId.replace(/'/g,"\\'")}','${c.replace(/'/g,"\\'")}');event.preventDefault();"
      style="padding:8px 12px;cursor:pointer;font-size:0.85rem;border-bottom:1px solid var(--border);color:var(--text);"
      onmouseenter="this.style.background='var(--bg)'" onmouseleave="this.style.background=''">${c}</div>`
  ).join('');
  sug.style.display='block';
}

function selectSuggestion(inputId,val){
  document.getElementById(inputId).value=val;
  hideSuggestions(inputId);
}

function hideSuggestions(inputId){
  const sug=document.getElementById(inputId.replace('cn-','sug-'));
  if(sug) sug.style.display='none';
}

async function loadExistingSubmission(){
  const {data}=await db.from('submissions').select('*').eq('session_id',SESSION_ID);
  document.getElementById('college-inputs').innerHTML='';collegeCount=0;
  if(data&&data.length>0){
    const r=data[0];
    document.getElementById('f-gpa').value=r.gpa||'';
    document.getElementById('f-gpa-w').value=r.gpa_weighted||'';
    document.getElementById('f-sat').value=r.sat||'';
    document.getElementById('f-act').value=r.act||'';
    document.getElementById('f-rank').value=r.class_rank||'';
    document.getElementById('f-major').value=r.major||'';
    document.getElementById('f-ecs').value=r.extracurriculars||'';
    document.getElementById('f-year').value=r.grad_year||'';
    data.forEach(row=>addCollege(row.college_name||'',row.decision||'Accepted'));
    document.getElementById('submit-btn').textContent='Update Submission';
    document.getElementById('form-title').textContent='Edit your Submission';
    document.getElementById('form-subtitle').textContent='Update your results below.';
  } else {
    ['f-gpa','f-gpa-w','f-sat','f-act','f-rank','f-major','f-ecs','f-year'].forEach(id=>document.getElementById(id).value='');
    addCollege();
    document.getElementById('submit-btn').textContent='Submit';
    document.getElementById('form-title').textContent='Add your college results';
    document.getElementById('form-subtitle').textContent='Anonymous — your name is never stored.';
  }
}

async function submitForm(){
  const gpa=parseFloat(document.getElementById('f-gpa').value);
  const gpaW=parseFloat(document.getElementById('f-gpa-w').value)||null;
  const year=parseInt(document.getElementById('f-year').value);
  if(!gpa||!gpaW||!year){alert('Unweighted GPA, weighted GPA, and graduation year are required!');return;}
  const rows=[];
  for(let i=0;i<collegeCount;i++){
    const cn=document.getElementById(`cn-${i}`),cd=document.getElementById(`cd-${i}`);
    if(cn&&cn.value.trim()) rows.push({
      gpa,grad_year:year,gpa_weighted:gpaW,
      sat:parseInt(document.getElementById('f-sat').value)||null,
      act:parseInt(document.getElementById('f-act').value)||null,
      class_rank:parseInt(document.getElementById('f-rank').value)||null,
      major:document.getElementById('f-major').value.trim()||null,
      extracurriculars:document.getElementById('f-ecs').value.trim()||null,
      college_name:cn.value.trim(),decision:cd.value,session_id:SESSION_ID
    });
  }
  if(!rows.length){alert('Add at least one college!');return;}
  await db.from('submissions').delete().eq('session_id',SESSION_ID);
  const {error}=await db.from('submissions').insert(rows);
  if(error){alert('Something went wrong. Try again.');console.error(error);return;}

  localStorage.setItem('cr_submitted','1');
  updateNav();
  document.getElementById('success-msg').style.display='block';

  // Burst particles then navigate
  burstParticles();

  setTimeout(async()=>{
    showPage('results');
    const {data}=await db.from('submissions').select('*');
    allData=data||[];
    renderTabs();
    const yearData=allData.filter(r=>r.grad_year==activeYear);
    renderStats(yearData);
    renderEntries(yearData);
    scatterData=yearData;
    buildChart(yearData,true);
  },900);
}

// PARTICLE BURST
function burstParticles(){
  const canvas=document.getElementById('particle-canvas');
  canvas.style.display='block';
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  const ctx=canvas.getContext('2d');
  const cx=window.innerWidth/2;
  const cy=window.innerHeight/2;
  const colors=['#16a34a','#2563eb','#ca8a04','#dc2626','#db2777','#8b5cf6','#f59e0b'];
  const particles=[];
  for(let i=0;i<60;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=Math.random()*8+3;
    particles.push({
      x:cx,y:cy,
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed-3,
      r:Math.random()*5+3,
      color:colors[Math.floor(Math.random()*colors.length)],
      alpha:1,life:1,
      shape:Math.random()>0.5?'circle':'rect',
      rot:Math.random()*360,
      rotV:(Math.random()-0.5)*10
    });
  }
  let frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let alive=false;
    particles.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.18;
      p.vx*=0.99; p.life-=0.018; p.alpha=p.life;
      p.rot+=p.rotV;
      if(p.life>0){
        alive=true;
        ctx.save();
        ctx.globalAlpha=p.alpha;
        ctx.fillStyle=p.color;
        ctx.translate(p.x,p.y);
        ctx.rotate(p.rot*Math.PI/180);
        if(p.shape==='circle'){
          ctx.beginPath();ctx.arc(0,0,p.r,0,Math.PI*2);ctx.fill();
        } else {
          ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r);
        }
        ctx.restore();
      }
    });
    if(alive) requestAnimationFrame(draw);
    else { ctx.clearRect(0,0,canvas.width,canvas.height); canvas.style.display='none'; }
  }
  draw();
}

updateNav();
loadData();
</script>
